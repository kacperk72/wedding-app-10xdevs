name: AI Reviewer
description: Uruchamia agenta code review (Vercel AI SDK + OpenRouter) na diffie PR-a, komentuje i etykietuje PR-a.

branding:
  icon: terminal
  color: purple

inputs:
  api-key:
    description: Klucz OpenRouter API (sekret repo).
    required: true
  github-token:
    description: Token do komentowania PR-a i nadawania etykiet.
    required: true
  pr-number:
    description: Numer pull requesta.
    required: true
  base-ref:
    description: Gałąź bazowa PR-a (do policzenia diffa względem niej).
    required: true
  pr-title:
    description: Tytuł PR-a (kontekst dla agenta).
    required: false
    default: ''
  pr-body:
    description: Opis PR-a (kontekst dla agenta).
    required: false
    default: ''
  model:
    description: Model OpenRouter (vendor/model). Pusty = domyślny z agenta.
    required: false
    default: ''

outputs:
  verdict:
    description: Werdykt agenta (pass / fail).
    value: ${{ steps.agent.outputs.verdict }}

runs:
  using: composite
  steps:
    - name: Konfiguracja Node
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Instalacja zależności reviewera
      shell: bash
      working-directory: packages/code-reviewer
      run: npm ci

    - name: Policz diff względem bazy
      shell: bash
      run: |
        git fetch --no-tags origin "${{ inputs.base-ref }}" || true
        # Wykluczamy pliki generowane/lock — review ma oceniać kod, nie lockfile,
        # a ich rozmiar wysadza okno kontekstowe modelu.
        git diff "origin/${{ inputs.base-ref }}...HEAD" -- . \
          ':(exclude)**/package-lock.json' \
          ':(exclude)**/*.lock' \
          ':(exclude)**/pnpm-lock.yaml' \
          ':(exclude)**/yarn.lock' \
          ':(exclude)**/dist/**' \
          ':(exclude)**/*.min.js' \
          ':(exclude)**/*.snap' \
          > "$RUNNER_TEMP/pr.diff"
        echo "Diff: $(wc -l < "$RUNNER_TEMP/pr.diff") linii (bez plików generowanych)."

    - name: Uruchom agenta review
      id: agent
      shell: bash
      working-directory: packages/code-reviewer
      env:
        OPENROUTER_API_KEY: ${{ inputs.api-key }}
        PR_TITLE: ${{ inputs.pr-title }}
        PR_BODY: ${{ inputs.pr-body }}
        REVIEW_MODEL: ${{ inputs.model }}
      run: |
        npx tsx src/review.ts < "$RUNNER_TEMP/pr.diff" > "$RUNNER_TEMP/review.json"
        verdict=$(node -e "process.stdout.write(JSON.parse(require('fs').readFileSync(process.env.RUNNER_TEMP+'/review.json','utf8')).verdict)")
        echo "verdict=$verdict" >> "$GITHUB_OUTPUT"
        echo "Werdykt agenta: $verdict"

    - name: Zbuduj komentarz
      shell: bash
      run: |
        node "$GITHUB_ACTION_PATH/scripts/format-comment.mjs" "$RUNNER_TEMP/review.json" > "$RUNNER_TEMP/comment.md"

    - name: Upewnij się, że etykiety istnieją
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        gh label create "ai-cr:passed" --color 2ea44f --description "AI code review: pass" --force || true
        gh label create "ai-cr:failed" --color d73a4a --description "AI code review: fail" --force || true

    - name: Komentarz + etykieta na PR
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        gh pr comment "${{ inputs.pr-number }}" --body-file "$RUNNER_TEMP/comment.md"
        if [ "${{ steps.agent.outputs.verdict }}" = "pass" ]; then
          gh pr edit "${{ inputs.pr-number }}" --add-label "ai-cr:passed" --remove-label "ai-cr:failed" || true
        else
          gh pr edit "${{ inputs.pr-number }}" --add-label "ai-cr:failed" --remove-label "ai-cr:passed" || true
        fi
