name: Build, test and deploy frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

# Backend NIE jest deployowany z tego workflowa — Hostinger sam ciągnie repo
# z main przy każdym pushu (Application root: wedding-planner/backend),
# robi npm install i restartuje Node.js app. Workflow trzyma tylko frontend
# (statyczne pliki, Hostinger ich nie buduje).

jobs:
  frontend:
    name: Build & deploy Angular SPA
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wedding-planner/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: wedding-planner/frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint (if configured)
        run: npm run lint --if-present

      - name: Test
        run: npm test -- --watch=false --browsers=ChromeHeadless

      - name: Build
        run: npm run build -- --configuration=production

      - name: Deploy frontend to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:     ${{ secrets.HOSTINGER_FTP_HOST }}
          username:   ${{ secrets.HOSTINGER_FTP_USER }}
          password:   ${{ secrets.HOSTINGER_FTP_PASS }}
          local-dir:  ./wedding-planner/frontend/dist/wedding-planner/browser/
          # Użytkownik FTP loguje się już WEWNĄTRZ public_html, więc katalog
          # docelowy to "./". Podanie "/public_html/" tworzyło zagnieżdżenie
          # public_html/public_html/ — pliki lądowały piętro niżej niż docroot.
          server-dir: ./
          dangerous-clean-slate: false
