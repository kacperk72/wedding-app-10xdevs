name: CI gates and frontend deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Backend NIE jest deployowany z tego workflowa — Hostinger sam ciągnie repo
# z main przy każdym pushu (Application root: wedding-planner/backend),
# robi npm install i restartuje Node.js app. Workflow trzyma tylko frontend
# (statyczne pliki, Hostinger ich nie buduje).
#
# UWAGA: przez auto-pull Hostingera te bramki CI są silnym sygnałem release'u
# i twardo blokują TYLKO deploy frontendu (FTP). Zły push na main i tak trafi
# do backendu na Hostingerze — zmiana tej topologii jest poza zakresem F-02.

jobs:
  gates-and-deploy:
    name: Quality gates, build & deploy Angular SPA
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            wedding-planner/backend/package-lock.json
            wedding-planner/frontend/package-lock.json

      # --- Backend: deterministyczne bramki ---

      - name: Backend install
        working-directory: wedding-planner/backend
        run: npm ci

      - name: Backend lint
        working-directory: wedding-planner/backend
        run: npm run lint

      - name: Backend tests
        working-directory: wedding-planner/backend
        run: npm test

      # --- Frontend: deterministyczne bramki ---

      - name: Frontend install
        working-directory: wedding-planner/frontend
        run: npm ci

      - name: Frontend lint
        working-directory: wedding-planner/frontend
        run: npm run lint

      - name: Frontend unit tests
        working-directory: wedding-planner/frontend
        run: npm run test:ci

      - name: Frontend production build
        working-directory: wedding-planner/frontend
        run: npm run build-prod

      # --- E2E: hermetyczny Playwright (DB_TEST_MODE + AUTH_TEST_MODE,
      #     bez Supabase i bez live SSO — patrz playwright.config.ts) ---

      - name: Install Playwright Chromium
        working-directory: wedding-planner/frontend
        run: npx playwright install --with-deps chromium

      - name: Playwright E2E
        working-directory: wedding-planner/frontend
        run: npm run e2e

      # --- Migration drift guard (Risk #3): lokalne migracje na dysku vs stan
      #     zastosowany na zdalnym projekcie Supabase. Sieciowy gate — biegnie
      #     PO deterministycznych bramkach i PRZED deployem, osobno od E2E, żeby
      #     awarie sieci były łatwe do odróżnienia. Porównuje WERSJE, nie liczbę
      #     plików (patrz scripts/check-migration-drift.js). ---

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Migration drift guard
        working-directory: wedding-planner/backend
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
          npm run migration:check

      # --- Deploy frontendu dopiero po przejściu wszystkich bramek ---

      - name: Deploy frontend to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:     ${{ secrets.HOSTINGER_FTP_HOST }}
          username:   ${{ secrets.HOSTINGER_FTP_USER }}
          password:   ${{ secrets.HOSTINGER_FTP_PASS }}
          local-dir:  ./wedding-planner/frontend/dist/wedding-planner/browser/
          # Sesja FTP startuje w zagnieżdżonym public_html/public_html (home
          # konta FTP jest ustawiony o poziom za głęboko). Prawdziwy docroot
          # serwowany przez domenę to katalog NADRZĘDNY, stąd "../".
          # Docelowo lepiej poprawić katalog konta FTP w hPanel na public_html.
          server-dir: ../
          dangerous-clean-slate: false

      # --- Post-deploy smoke: backend żyje i ma połączenie z Supabase. Uderza
      #     w prawdziwy host backendu (Hostinger), NIE w domenę frontendu
      #     (wedding-planner-kubitk.pl jest tylko dla SPA). Backend deployuje się
      #     przez auto-pull Hostingera, więc smoke jest sygnałem release'u, nie
      #     twardą bramką backendu. ---

      - name: Post-deploy backend health smoke
        run: |
          set -euo pipefail
          URL="https://deeppink-mole-431102.hostingersite.com/api/health"
          body=$(curl -sS --fail --max-time 30 --retry 5 --retry-delay 10 --retry-all-errors "$URL")
          echo "Health response: $body"
          echo "$body" | grep -q '"status":"ok"' || { echo "SMOKE FAIL: status != ok"; exit 1; }
          echo "$body" | grep -q '"supabase":"reachable"' || { echo "SMOKE FAIL: supabase != reachable"; exit 1; }
          echo "Smoke OK: backend healthy and Supabase reachable."
