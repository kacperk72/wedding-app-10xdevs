<article class="surface panel course-section">
  <div class="panel__header">
    <div>
      <p class="panel__eyebrow">{{ hint(course()) }}</p>
      <h3>{{ course().title }}</h3>
      @if (controlType(course()) === 'radio' && selectedName()) {
        <p class="course-section__chosen">Wybrano: <strong>{{ selectedName() }}</strong></p>
      }
    </div>
    @if (!packageModifiable()) {
      <span class="badge badge--neutral">fixed</span>
    }
  </div>

  <ul
    class="dish-list"
    [attr.role]="controlType(course()) === 'radio' ? 'radiogroup' : null"
    [attr.aria-label]="controlType(course()) === 'radio' ? course().title : null"
  >
    @for (dish of course().dishes; track dish.dishId) {
      <li>
        <app-dish-row
          [dish]="dish"
          [selected]="course().selectionMode === 'all_served' || pickedDishIds().has(dish.dishId)"
          [disabled]="isDisabled(course())"
          [controlType]="controlType(course())"
          [radioName]="'course-' + course().id"
          [editable]="packageModifiable()"
          (toggled)="pickChanged.emit({ course: course(), dish, selected: $event })"
          (editRequested)="openEdit(dish)"
          (unlinkRequested)="dishUnlinked.emit({ course: course(), dish })"
        />
      </li>
    }
  </ul>

  @if (packageModifiable()) {
    <div class="custom-dish">
      <button type="button" class="button-like button-like--secondary" (click)="openAdd()">
        Dodaj własne danie
      </button>
    </div>
  }
</article>

@if (editorOpen()) {
  <app-dish-editor-dialog
    [dish]="editingDish()"
    [courseTitle]="course().title"
    (saved)="onSaved($event)"
    (closed)="editorOpen.set(false)"
  />
}
