<label class="dish-card" [class.dish-card--disabled]="disabled()">
  @if (controlType() !== 'none') {
    <input
      [type]="controlType()"
      [checked]="selected()"
      [disabled]="disabled()"
      (change)="toggled.emit($any($event.target).checked)"
    />
  }
  <span class="dish-card__body">
    <strong>{{ dish().name }}</strong>
    @if (dish().description) {
      <span>{{ dish().description }}</span>
    }
    <span class="dish-card__flags">
      @if (dish().isVegetarian) {
        <span class="badge badge--success" title="Wegetariańskie">vege</span>
      }
      @if (dish().isVegan) {
        <span class="badge badge--success" title="Wegańskie">vegan</span>
      }
      @if (dish().isGlutenFree) {
        <span class="badge badge--info" title="Bez glutenu">GF</span>
      }
      @if (dish().allergens.length > 0) {
        <span class="badge badge--warning" [title]="dish().allergens.join(', ')">alergeny</span>
      }
    </span>
  </span>
</label>
