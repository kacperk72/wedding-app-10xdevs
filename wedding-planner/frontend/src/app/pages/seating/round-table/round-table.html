<section
  class="round-table-card"
  [class.round-table-card--full]="isFull()"
  cdkDropList
  [cdkDropListData]="table()"
  [cdkDropListEnterPredicate]="enterPredicate()"
  (cdkDropListDropped)="dropped.emit($event)"
>
  <button
    type="button"
    class="round-table-card__handle"
    cdkDragHandle
    aria-label="Zmień kolejność stołu — przeciągnij albo użyj strzałek w lewo/prawo"
    (keydown.arrowleft)="$event.preventDefault(); moveTable.emit(-1)"
    (keydown.arrowright)="$event.preventDefault(); moveTable.emit(1)"
  >
    <app-icon name="grip-vertical" [size]="16" />
  </button>

  <div class="round-table-card__header">
    <button
      type="button"
      class="round-table-card__edit"
      aria-label="Edytuj stół"
      (click)="editTable.emit(table())"
    >
      <strong>{{ table().name }}</strong>
      <app-icon name="edit" [size]="14" />
    </button>
    <span>{{ guests().length }} / {{ table().seatsCount }} miejsc</span>
    @if (isFull()) {
      <span class="round-table-card__badge">pełny</span>
    }
  </div>

  <div class="round-table-card__seats" aria-label="Goście przy stole">
    @for (guest of guests(); track guest.id) {
      <button
        type="button"
        class="seat-chip"
        cdkDrag
        [cdkDragData]="guest"
        [attr.title]="guestName(guest)"
        [attr.aria-label]="guestName(guest)"
        (keydown.enter)="guestMenu.emit(guest)"
        (click)="guestMenu.emit(guest)"
      >
        {{ initials(guest) }}
      </button>
    }
  </div>
</section>
