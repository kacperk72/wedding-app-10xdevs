<label class="input-password">
  @if (label()) {
    <span class="input-password__label">{{ label() }}</span>
  }
  <div class="input-password__row">
    <input
      class="input-password__field"
      [class.input-password__field--error]="error()"
      [type]="visible() ? 'text' : 'password'"
      [placeholder]="placeholder()"
      [value]="value()"
      [disabled]="disabled()"
      [attr.autocomplete]="autocomplete()"
      (input)="onInput($event)"
      (blur)="onBlur()"
    />
    <button
      type="button"
      class="input-password__toggle"
      [attr.aria-label]="visible() ? 'Ukryj hasło' : 'Pokaż hasło'"
      (click)="toggleVisible()"
    >
      @if (visible()) {
        🙈
      } @else {
        👁
      }
    </button>
  </div>
  @if (error()) {
    <span class="input-password__error" role="alert">{{ error() }}</span>
  }
</label>
